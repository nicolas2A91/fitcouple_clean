<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>FitCouple — Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="light">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="config.js"></script>
  <style>
    .quick-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }
    .qcard {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--rad);
      padding: 16px 14px;
      box-shadow: var(--shadow-sm);
      animation: slideUp .3s ease both;
      position: relative;
      overflow: hidden;
    }
    .qcard::before {
      content: '';
      position: absolute;
      top: -16px; right: -16px;
      width: 60px; height: 60px;
      border-radius: 50%;
      opacity: .12;
    }
    .qcard.purple::before { background: var(--purple) }
    .qcard.pink::before   { background: var(--pink) }
    .qcard.amber::before  { background: var(--amber) }
    .qcard.coral::before  { background: var(--coral) }

    .qcard-emoji { font-size: 22px; margin-bottom: 8px; display: block }
    .qcard-val {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 28px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -1px;
    }
    .qcard-label {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    .section-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .section-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
    }
    .section-link {
      font-size: 12px;
      color: var(--purple);
      font-weight: 600;
      text-decoration: none;
    }

    .meal-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 0;
      border-bottom: 1px solid var(--border);
    }
    .meal-row:last-child { border-bottom: none; padding-bottom: 0 }
    .meal-row:first-child { padding-top: 0 }

    .logout-btn {
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      color: var(--muted);
      transition: all .15s;
    }
    .logout-btn:hover { background: var(--coral-xl); color: var(--coral) }

    .challenge-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--rad);
      padding: 16px;
      margin-bottom: 10px;
      box-shadow: var(--shadow-sm);
      animation: slideUp .3s ease both;
    }
    .challenge-card.done {
      border-color: rgba(5,150,105,0.2);
      background: linear-gradient(135deg, var(--green-xl) 0%, var(--surface) 100%);
    }
  </style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div>
        <p id="date-label" style="font-size:12px;color:var(--muted);text-transform:capitalize;font-weight:300"></p>
        <h1 id="greeting">Bonjour 👋</h1>
      </div>
      <button onclick="logout()" class="logout-btn">⎋</button>
    </div>
  </div>

  <div class="page" id="content">
    <div class="loading">
      <span>✨</span>
      <span>Chargement de votre journée…</span>
    </div>
  </div>
</div>

<nav class="nav">
  <a href="index.html" class="active">
    <span class="ni">🏠</span><span class="nl">Home</span><div class="nd"></div>
  </a>
  <a href="repas.html"><span class="ni">📅</span><span class="nl">Repas</span></a>
  <a href="sport.html"><span class="ni">⚡</span><span class="nl">Sport</span></a>
  <a href="caca.html"><span class="ni">💩</span><span class="nl">Caca</span></a>
  <a href="objectifs.html"><span class="ni">🎯</span><span class="nl">Objectifs</span></a>
</nav>

<script>
const SCORE_BADGE = {'A+':'b-green','A':'b-teal','B':'b-amber','C':'b-coral','D':'b-coral'}

async function logout() { await db.auth.signOut(); window.location.href = 'login.html' }

async function init() {
  const { data: { session } } = await db.auth.getSession()
  if (!session) { window.location.replace('login.html'); return }
  const { data: profile } = await db.from('profiles').select('*').eq('id', session.user.id).single()
  if (!profile) { await db.auth.signOut(); window.location.replace('login.html'); return }

  const now = new Date()
  document.getElementById('date-label').textContent = now.toLocaleDateString('fr-FR', { weekday:'long', day:'numeric', month:'long' })
  document.getElementById('greeting').innerHTML = `Bonjour <span class="grad-text">${profile.name}</span> 👋`

  const today = now.toISOString().split('T')[0]

  const [mealsRes, challengesRes, poopRes, objRes, streakRes, partnerRes] = await Promise.all([
    db.from('meals').select('*').eq('date', today).eq('couple_id', profile.couple_id),
    db.from('challenges').select('*, challenge_progress(*)').eq('challenge_date', today).eq('couple_id', profile.couple_id),
    db.from('poop_logs').select('*, profiles(name)').eq('couple_id', profile.couple_id).order('logged_at', {ascending:false}).limit(3),
    db.from('objectives').select('*').eq('couple_id', profile.couple_id).eq('completed', false),
    getOrCreateStreak(profile.couple_id),
    db.from('profiles').select('*').eq('couple_id', profile.couple_id).neq('id', profile.id).maybeSingle(),
  ])

  const meals = mealsRes.data || []
  const challenges = challengesRes.data || []
  const poop = poopRes.data || []
  const objectives = objRes.data || []
  const streak = streakRes
  const partner = partnerRes.data

  const challengesDone = challenges.filter(c => c.challenge_progress?.some(p => p.user_id === profile.id && p.completed)).length
  const myTodayPoop = poop.filter(p => p.user_id === profile.id && p.logged_at.startsWith(today)).length
  const objPct = objectives.length ? Math.round(objectives.reduce((s,o) => s + Math.min(100, o.current_value/o.target*100), 0) / objectives.length) : 0

  const streakEmoji = streak.current_streak >= 7 ? '🔥' : streak.current_streak >= 3 ? '⚡' : '🌱'
  const streakLabel = streak.current_streak >= 7 ? 'En feu !' : streak.current_streak >= 3 ? 'Belle lancée' : 'C\'est parti'

  const bars = Array.from({length:7}, (_,i) => {
    const filled = i < Math.min(7, streak.current_streak)
    return `<div style="flex:1;height:5px;border-radius:3px;background:${filled?'rgba(255,255,255,.75)':'rgba(255,255,255,.15)'};transition:background .3s ${i*0.05}s"></div>`
  }).join('')

  document.getElementById('content').innerHTML = `

    <!-- STREAK HERO -->
    <div class="streak" style="animation:slideUp .4s ease">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;position:relative;z-index:1">
        <div>
          <div style="font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;opacity:.6;margin-bottom:8px">Streak couple</div>
          <div style="display:flex;align-items:baseline;gap:8px">
            <div class="hero-num">${streak.current_streak}</div>
            <div style="font-size:14px;opacity:.7;font-weight:300">jours</div>
          </div>
          <div style="display:flex;align-items:center;gap:8px;margin-top:12px">
            ${partner ? `
              <div class="av" style="width:28px;height:28px;font-size:10px;background:rgba(255,255,255,.25)">${profile.name[0]}</div>
              <div class="av" style="width:28px;height:28px;font-size:10px;background:rgba(255,255,255,.18)">${partner.name[0]}</div>
            ` : `<div class="av" style="width:28px;height:28px;font-size:10px;background:rgba(255,255,255,.25)">${profile.name[0]}</div>`}
            <span style="font-size:12px;opacity:.8">${streakEmoji} ${streakLabel}</span>
          </div>
        </div>
        <div style="text-align:right">
          <div style="font-size:10px;opacity:.5;font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px">Record</div>
          <div style="font-family:'Bricolage Grotesque',sans-serif;font-size:32px;font-weight:800;opacity:.75;letter-spacing:-1px">${streak.best_streak}</div>
        </div>
      </div>
      <div style="display:flex;gap:5px;margin-top:16px;position:relative;z-index:1">${bars}</div>
    </div>

    <!-- QUICK STATS -->
    <div class="quick-grid">
      <div class="qcard purple" style="animation-delay:.05s">
        <span class="qcard-emoji">🥗</span>
        <div class="qcard-val" style="color:var(--purple)">${meals.length}</div>
        <div class="qcard-label">Repas</div>
      </div>
      <div class="qcard pink" style="animation-delay:.1s">
        <span class="qcard-emoji">⚡</span>
        <div class="qcard-val" style="color:var(--pink)">${challengesDone}<span style="font-size:16px;opacity:.4">/${challenges.length}</span></div>
        <div class="qcard-label">Défis</div>
      </div>
      <div class="qcard amber" style="animation-delay:.15s">
        <span class="qcard-emoji">💩</span>
        <div class="qcard-val" style="color:var(--amber)">${myTodayPoop}</div>
        <div class="qcard-label">Passages</div>
      </div>
      <div class="qcard coral" style="animation-delay:.2s">
        <span class="qcard-emoji">🎯</span>
        <div class="qcard-val" style="color:var(--coral)">${objPct}<span style="font-size:16px;opacity:.4">%</span></div>
        <div class="qcard-label">Objectifs</div>
      </div>
    </div>

    ${challenges.length ? `
    <div class="section-row" style="animation:slideUp .3s .25s ease both">
      <span class="section-title">Défis du jour</span>
      <a href="sport.html" class="section-link">Voir tout →</a>
    </div>
    ${challenges.slice(0,2).map((c,i) => {
      const myP = c.challenge_progress?.find(p => p.user_id === profile.id)
      const pct = c.target > 0 ? Math.min(100, Math.round(((myP?.value||0)/c.target)*100)) : 0
      const done = myP?.completed
      return `<div class="challenge-card ${done?'done':''}" style="animation-delay:${.3+i*.05}s">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <span style="font-size:14px;font-weight:600;flex:1;padding-right:10px">${c.title}</span>
          <span class="badge ${done?'b-green':'b-amber'}">${done?'✓ Fait':'En cours'}</span>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:8px">
          <span>${myP?.value||0} / ${c.target} ${c.unit}</span>
          <span style="font-weight:600;color:${done?'var(--green)':'var(--purple)'}">${pct}%</span>
        </div>
        <div class="prog">
          <div class="prog-fill" style="width:${pct}%;background:${done?'linear-gradient(90deg,var(--green),var(--green-l))':'linear-gradient(90deg,var(--purple),var(--purple-l))'}"></div>
        </div>
      </div>`
    }).join('')}` : ''}

    ${meals.length ? `
    <div class="section-row" style="animation:slideUp .3s .35s ease both">
      <span class="section-title">Repas du jour</span>
      <a href="repas.html" class="section-link">Voir tout →</a>
    </div>
    <div class="card" style="animation-delay:.4s">
      ${meals.slice(0,4).map(m => `
      <div class="meal-row">
        <div class="udot ${m.user_id === profile.id ? 'dot-a' : 'dot-n'}" style="width:6px;height:6px"></div>
        <span style="font-size:13px;flex:1">${m.name}</span>
        <span style="font-size:11px;color:var(--muted)">${m.user_id===profile.id?profile.name:(partner?.name||'')}</span>
      </div>`).join('')}
    </div>` : ''}

    ${poop.length ? `
    <div class="section-row" style="animation:slideUp .3s .45s ease both">
      <span class="section-title">Dernier passage</span>
      <a href="caca.html" class="section-link">Journal →</a>
    </div>
    <div class="card" style="animation-delay:.5s">
      <div class="row-item" style="padding-top:0">
        <div class="av ${poop[0].user_id === profile.id ? 'av-a' : 'av-b'}" style="font-size:10px">${poop[0].profiles?.name?.[0]||'?'}</div>
        <div style="flex:1">
          <div style="font-size:13px;font-weight:500">${BRISTOL_EMOJI[poop[0].bristol_type]} Type ${poop[0].bristol_type}</div>
          <div style="font-size:11px;color:var(--muted)">${new Date(poop[0].logged_at).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}</div>
        </div>
        <span class="badge ${SCORE_BADGE[poop[0].score]||'b-gray'}">${poop[0].score}</span>
      </div>
    </div>` : ''}

    ${meals.length === 0 && challenges.length === 0 ? `
    <div class="empty" style="margin-top:20px;animation:slideUp .5s .3s ease both;opacity:0;animation-fill-mode:both">
      <div class="empty-i">🚀</div>
      <p style="font-weight:600;color:var(--text);font-size:16px">Commencez votre journée !</p>
      <p style="font-size:13px;margin-top:6px;line-height:1.5">Ajoutez un repas ou créez<br>un défi sport ensemble</p>
    </div>` : ''}
  `
}

async function getOrCreateStreak(coupleId) {
  const { data } = await db.from('streaks').select('*').eq('couple_id', coupleId).maybeSingle()
  if (data) return data
  const s = { couple_id: coupleId, current_streak: 0, best_streak: 0, last_active_date: new Date().toISOString().split('T')[0] }
  await db.from('streaks').insert(s)
  return s
}

init()
</script>
</body>
</html>
