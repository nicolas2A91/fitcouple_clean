<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>FitCouple — Debug</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="config.js"></script>
</head>
<body>
<div style="padding:20px;font-family:monospace;font-size:13px;color:#fff;background:#111;min-height:100vh">
  <h2 style="color:#1D9E75;margin-bottom:16px">🔍 Debug Auth</h2>
  <div id="log"></div>
</div>
<script>
function log(msg, color) {
  const d = document.getElementById('log')
  const line = document.createElement('div')
  line.style.cssText = 'padding:6px 0;border-bottom:1px solid #222;color:' + (color||'#ccc')
  line.textContent = new Date().toLocaleTimeString() + ' — ' + msg
  d.appendChild(line)
}

async function run() {
  log('Démarrage...', '#888')

  try {
    log('1. Test getSession()...')
    const { data: { session }, error: e1 } = await db.auth.getSession()
    if (e1) { log('❌ getSession error: ' + e1.message, '#f55'); return }
    if (!session) {
      log('⚠️ Pas de session locale — non connecté ?', '#EF9F27')
      log('👉 Tu dois être connecté pour voir cette page', '#EF9F27')
      log('→ Va sur login.html et connecte-toi', '#888')
      return
    }
    log('✅ Session OK — user: ' + session.user.email, '#1D9E75')
    log('   user.id: ' + session.user.id, '#888')

    log('2. Test lecture profil...')
    const { data: profile, error: e2 } = await db.from('profiles').select('*').eq('id', session.user.id).single()
    if (e2) { log('❌ Profil error: ' + e2.message, '#f55'); return }
    if (!profile) { log('❌ Aucun profil trouvé pour cet user', '#f55'); return }
    log('✅ Profil OK — name: ' + profile.name + ', couple_id: ' + profile.couple_id, '#1D9E75')

    log('3. Test lecture meals...')
    const { data: meals, error: e3 } = await db.from('meals').select('*').limit(1)
    if (e3) { log('❌ Meals error: ' + e3.message, '#f55') } 
    else { log('✅ Meals OK (' + (meals?.length||0) + ' résultats)', '#1D9E75') }

    log('4. Test streak...')
    const { data: streak, error: e4 } = await db.from('streaks').select('*').eq('couple_id', profile.couple_id).maybeSingle()
    if (e4) { log('❌ Streak error: ' + e4.message, '#f55') }
    else { log('✅ Streak OK: ' + JSON.stringify(streak), '#1D9E75') }

    log('5. Test partner...')
    const { data: partner, error: e5 } = await db.from('profiles').select('*').eq('couple_id', profile.couple_id).neq('id', profile.id).maybeSingle()
    if (e5) { log('❌ Partner error: ' + e5.message, '#f55') }
    else { log('✅ Partner: ' + (partner ? partner.name : 'aucun encore'), '#1D9E75') }

    log('━━━ TOUT OK ━━━ Le dashboard devrait marcher', '#1D9E75')
    log('→ Retourne sur index.html', '#888')

  } catch(err) {
    log('💥 Exception: ' + err.message, '#f55')
    log(err.stack, '#f55')
  }
}
run()
</script>
</body>
</html>
