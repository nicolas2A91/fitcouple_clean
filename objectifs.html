<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>FitCouple — Objectifs</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="config.js"></script>
</head>
<body>
<div class="app">
  <div class="hdr" style="display:flex;justify-content:space-between;align-items:flex-start"><div><h1>Objectifs 🎯</h1><p>Vos challenges long terme</p></div> <button onclick="handleLogout()" style="background:none;border:none;cursor:pointer;font-size:11px;color:var(--muted);padding:4px 0;margin-top:6px">Déconnexion</button></div>
  <div class="page" style="padding-bottom:80px;">
    <div id="streak-section"></div>
    <button class="btn btn-p" style="margin-bottom:16px" onclick="document.getElementById('modal').classList.add('open')">+ Nouvel objectif</button>
    <div id="shared-section"></div>
    <div id="personal-section"></div>
    <div id="done-section"></div>
  </div>
</div>

<nav class="nav" style="position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--card,#fff);border-top:0.5px solid rgba(0,0,0,0.1);padding-bottom:env(safe-area-inset-bottom,0px);display:grid;grid-template-columns:repeat(6,1fr);">
  <a href="index.html"><span class="ni">🏠</span><span class="nl">Dashboard</span></a>
  <a href="repas.html"><span class="ni">🍽️</span><span class="nl">Repas</span></a>
  <a href="sport.html"><span class="ni">⚡</span><span class="nl">Sport</span></a>
  <a href="objectifs.html" class="active"><span class="ni">🎯</span><span class="nl">Objectifs</span></a>
  <a href="caca.html"><span class="ni">💩</span><span class="nl">Journal</span></a>
  <a href="poids.html"><span class="ni">⚖️</span><span class="nl">Poids</span></a>
</nav>

<!-- Modal -->
<div class="overlay" id="modal" onclick="closeModal(event)">
  <div class="modal" style="max-height:85vh;overflow-y:auto">
    <div class="mhandle"></div>
    <div class="mtitle">Nouvel objectif 🎯</div>

    <div class="slabel" style="padding-top:0">Templates</div>
    <div class="tags" id="templates"></div>

    <form onsubmit="addObjective(event)">
      <div class="ig"><label>Titre</label><input class="inp" id="o-title" placeholder="Mon objectif..." required></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div class="ig"><label>Cible</label><input class="inp" id="o-target" type="number" value="30" required></div>
        <div class="ig"><label>Unité</label><input class="inp" id="o-unit" placeholder="jours, km..." value="jours" required></div>
      </div>
      <div class="ig"><label>Échéance (optionnel)</label><input class="inp" id="o-deadline" type="date"></div>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:20px">
        <input type="checkbox" id="o-shared" style="width:18px;height:18px;accent-color:var(--green);cursor:pointer">
        <label for="o-shared" style="font-size:13px;color:var(--muted);cursor:pointer" id="shared-label">Objectif commun avec mon/ma chéri(e)</label>
      </div>
      <button class="btn btn-p" type="submit" id="o-btn">Créer l'objectif 🎯</button>
      <button class="btn btn-g" type="button" style="margin-top:8px" onclick="document.getElementById('modal').classList.remove('open')">Annuler</button>
    </form>
  </div>
</div>

<!-- Modal progression objectif -->
<div class="overlay" id="modal-progress-obj" onclick="if(event.target===this)document.getElementById('modal-progress-obj').classList.remove('open')">
  <div class="modal">
    <div class="mhandle"></div>
    <div class="mtitle">Ma progression 🎯</div>
    <div class="ig">
      <label id="obj-prog-label">Valeur actuelle</label>
      <input class="inp" id="obj-prog-value" type="number" min="0" placeholder="0">
    </div>
    <button class="btn btn-p" style="margin-bottom:8px" onclick="saveObjProgress()">Enregistrer 💪</button>
    <button class="btn btn-g" onclick="document.getElementById('modal-progress-obj').classList.remove('open')">Annuler</button>
  </div>
</div>

<!-- Modal édition -->
<div class="overlay" id="modal-edit" onclick="if(event.target===this)closeEditModal()">
  <div class="modal" style="max-height:85vh;overflow-y:auto">
    <div class="mhandle"></div>
    <div class="mtitle">Modifier l'objectif ✏️</div>
    <div class="ig"><label>Titre</label><input class="inp" id="e-title" placeholder="Mon objectif..." required></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="ig"><label>Cible</label><input class="inp" id="e-target" type="number" required></div>
      <div class="ig"><label>Unité</label><input class="inp" id="e-unit" required></div>
    </div>
    <div class="ig"><label>Valeur actuelle</label><input class="inp" id="e-current" type="number" min="0"></div>
    <div class="ig" style="margin-bottom:20px"><label>Échéance (optionnel)</label><input class="inp" id="e-deadline" type="date"></div>
    <button class="btn btn-p" onclick="saveEdit()">Enregistrer ✏️</button>
    <button class="btn btn-g" style="margin-top:8px" onclick="closeEditModal()">Annuler</button>
  </div>
</div>

<script>
let profile, editingObjId = null

const TEMPLATES = [
  { title:"Boire 2L d'eau/jour", target:30, unit:'jours', shared:false },
  { title:'Courir 100km ce mois', target:100, unit:'km', shared:true },
  { title:'5 fruits et légumes/jour', target:30, unit:'jours', shared:true },
  { title:'Zéro sucre ajouté 2 semaines', target:14, unit:'jours', shared:true },
  { title:'Méditer 10 min/jour', target:21, unit:'jours', shared:false },
  { title:'Dormir 8h/nuit', target:14, unit:'nuits', shared:false },
]

function closeModal(e) { if(e.target===document.getElementById('modal')) document.getElementById('modal').classList.remove('open') }
function closeEditModal() { document.getElementById('modal-edit').classList.remove('open'); editingObjId = null }

function openEditObj(o) {
  editingObjId = o.id
  document.getElementById('e-title').value = o.title
  document.getElementById('e-target').value = o.target
  document.getElementById('e-unit').value = o.unit
  document.getElementById('e-current').value = o.current_value
  document.getElementById('e-deadline').value = o.deadline || ''
  document.getElementById('modal-edit').classList.add('open')
}

async function saveEdit() {
  if (!editingObjId) return
  const newCurrent = +document.getElementById('e-current').value
  const newTarget = +document.getElementById('e-target').value
  await db.from('objectives').update({
    title: document.getElementById('e-title').value,
    target: newTarget,
    unit: document.getElementById('e-unit').value,
    current_value: newCurrent,
    deadline: document.getElementById('e-deadline').value || null,
    completed: newCurrent >= newTarget
  }).eq('id', editingObjId)
  closeEditModal()
  await loadAll()
}

async function deleteObj(id) {
  if (!confirm('Supprimer cet objectif ?')) return
  await db.from('objectives').delete().eq('id', id)
  await loadAll()
}

function pickTemplate(t) {
  document.getElementById('o-title').value = t.title
  document.getElementById('o-target').value = t.target
  document.getElementById('o-unit').value = t.unit
  document.getElementById('o-shared').checked = t.shared
  document.querySelectorAll('.tag').forEach(el => el.classList.toggle('sel', el.dataset.title === t.title))
}

async function loadAll() {
  const [objRes, streakRes] = await Promise.all([
    db.from('objectives').select('*, profiles(name)').eq('couple_id', profile.couple_id).order('created_at', {ascending:false}),
    db.from('streaks').select('*').eq('couple_id', profile.couple_id).single()
  ])

  const objs = objRes.data || []
  const streak = streakRes.data || { current_streak:0, best_streak:0 }
  const active = objs.filter(o => !o.completed)
  const done = objs.filter(o => o.completed)

  // Streak card
  const bars = Array.from({length:7}, (_,i) => {
    const filled = i < Math.min(7, streak.current_streak)
    return `<div style="flex:1;height:6px;border-radius:3px;background:${filled?'var(--green)':'var(--border)'}"></div>`
  }).join('')

  document.getElementById('streak-section').innerHTML = `
    <div class="streak">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Streak couple</div>
          <div style="font-size:38px;font-weight:800;color:var(--amber);line-height:1">
            ${streak.current_streak}
            <span style="font-size:14px;color:var(--muted);font-weight:400;margin-left:4px">jours</span>
          </div>
        </div>
        <div style="text-align:right">
          <div style="font-size:11px;color:var(--muted);margin-bottom:3px">Record</div>
          <div style="font-size:24px;font-weight:700;color:var(--muted)">${streak.best_streak}</div>
        </div>
      </div>
      <div style="display:flex;gap:4px;margin-top:12px">${bars}</div>
      <div style="font-size:10px;color:var(--muted);margin-top:5px;text-align:right">
        ${streak.current_streak >= 7 ? '🔥 Une semaine de suite !' : `${7-Math.min(7,streak.current_streak)} jours pour 7 de suite`}
      </div>
    </div>`

  const shared = active.filter(o => o.is_shared)
  document.getElementById('shared-section').innerHTML = shared.length === 0 ? '' : `
    <div class="slabel">🤝 Objectifs communs</div>
    ${shared.map(o => objCard(o, true)).join('')}`

  // Personal
  const personal = active.filter(o => !o.is_shared)
  document.getElementById('personal-section').innerHTML = personal.length === 0 ? '' : `
    <div class="slabel">👤 Mes objectifs</div>
    ${personal.map(o => objCard(o, false)).join('')}`

  // Done
  document.getElementById('done-section').innerHTML = done.length === 0 ? '' : `
    <div class="slabel">✅ Accomplis (${done.length})</div>
    <div class="card">${done.map((o,i) => `
      <div class="row-item" ${i===0?'style="padding-top:0"':''}>
        <span style="font-size:14px">🏆</span>
        <div style="flex:1;font-size:13px;color:var(--muted);text-decoration:line-through">${o.title}</div>
        <span class="badge b-green">FAIT</span>
        ${o.user_id === profile.id ? `<button onclick="deleteObj('${o.id}')" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px;padding:0 4px;margin-left:4px">🗑️</button>` : ''}
      </div>`).join('')}</div>`

  if (active.length === 0) {
    document.getElementById('personal-section').innerHTML = `
      <div class="empty"><div class="empty-i">🎯</div><p>Aucun objectif actif</p>
      <p style="font-size:11px;margin-top:6px">Fixez-vous des objectifs ensemble !</p></div>`
  }
}

function objCard(o, isShared) {
  const pct = Math.min(100, Math.round((o.current_value / o.target) * 100))
  const deadline = o.deadline ? `<span style="font-size:11px;color:var(--muted)">📅 ${new Date(o.deadline).toLocaleDateString('fr-FR',{day:'numeric',month:'short'})}</span>` : ''
  const isOwner = o.user_id === profile.id
  const safeTitle = encodeURIComponent(o.title||'')
  const safeUnit = encodeURIComponent(o.unit||'')
  const safeDeadline = o.deadline || ''
  return `<div class="card">
    <div class="card-hdr">
      <span class="card-title">${o.title}</span>
      <div style="display:flex;align-items:center;gap:2px">
        ${deadline}
        ${isOwner ? `
          <button onclick="openEditObjBtn(this)"
            data-id="${o.id}" data-title="${safeTitle}" data-target="${o.target}" data-unit="${safeUnit}" data-current="${o.current_value}" data-deadline="${safeDeadline}"
            style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;padding:0 4px">✏️</button>
          <button onclick="deleteObj('${o.id}')"
            style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;padding:0 4px">🗑️</button>
        ` : ''}
      </div>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px">
      <span style="color:var(--muted)">${o.current_value} / ${o.target} ${o.unit}</span>
      <span style="color:var(--green);font-weight:600">${pct}%</span>
    </div>
    <div class="prog" style="margin-bottom:10px">
      <div class="prog-fill" style="width:${pct}%;background:${isShared?'var(--green)':'var(--anna)'}"></div>
    </div>
    <button class="${isShared?'btn btn-o':'btn btn-g'}" style="font-size:12px;padding:7px" onclick="openObjProgressModal('${o.id}',${o.current_value},${o.target},'${safeUnit}')">
      + Mettre à jour ma progression
    </button>
  </div>`
}

let progressObjId = null, progressObjTarget = 0

function openObjProgressModal(id, current, target, unit) {
  progressObjId = id
  progressObjTarget = target
  document.getElementById('obj-prog-label').textContent = `Valeur actuelle (sur ${target} ${unit})`
  document.getElementById('obj-prog-value').value = current
  document.getElementById('modal-progress-obj').classList.add('open')
}

async function saveObjProgress() {
  const val = Math.min(progressObjTarget, Math.max(0, +document.getElementById('obj-prog-value').value))
  const completed = val >= progressObjTarget
  await db.from('objectives').update({ current_value: val, completed }).eq('id', progressObjId)

  // Update streak
  const today = new Date().toISOString().split('T')[0]
  const yesterday = new Date(Date.now()-86400000).toISOString().split('T')[0]
  const { data: st } = await db.from('streaks').select('*').eq('couple_id', profile.couple_id).single()
  if (st) {
    let cur = st.current_streak
    if (st.last_active_date === yesterday) cur++
    else if (st.last_active_date !== today) cur = 1
    const best = Math.max(cur, st.best_streak)
    await db.from('streaks').update({ current_streak: cur, best_streak: best, last_active_date: today, updated_at: new Date().toISOString() }).eq('couple_id', profile.couple_id)
  } else {
    await db.from('streaks').insert({ couple_id: profile.couple_id, current_streak: 1, best_streak: 1, last_active_date: today })
  }

  document.getElementById('modal-progress-obj').classList.remove('open')
  await loadAll()
}

function openEditObjBtn(btn) {
  editingObjId = btn.dataset.id
  document.getElementById('e-title').value = decodeURIComponent(btn.dataset.title)
  document.getElementById('e-target').value = btn.dataset.target
  document.getElementById('e-unit').value = decodeURIComponent(btn.dataset.unit)
  document.getElementById('e-current').value = btn.dataset.current
  document.getElementById('e-deadline').value = btn.dataset.deadline
  document.getElementById('modal-edit').classList.add('open')
}

async function addObjective(e) {
  e.preventDefault()
  const btn = document.getElementById('o-btn')
  btn.textContent = '...'
  await db.from('objectives').insert({
    couple_id: profile.couple_id,
    user_id: profile.id,
    title: document.getElementById('o-title').value,
    target: +document.getElementById('o-target').value,
    unit: document.getElementById('o-unit').value,
    deadline: document.getElementById('o-deadline').value || null,
    is_shared: document.getElementById('o-shared').checked,
    current_value: 0,
    completed: false
  })
  document.getElementById('modal').classList.remove('open')
  btn.textContent = "Créer l'objectif 🎯"
  await loadAll()
}

async function init() {
  const { data: { session } } = await db.auth.getSession()
  if (!session) { window.location.replace('login.html'); return }
  const { data: p } = await db.from('profiles').select('*').eq('id', session.user.id).single()
  if (!p) { await db.auth.signOut(); window.location.replace('login.html'); return }
  profile = p

  // Update shared label with partner name
  const { data: partner } = await db.from('profiles').select('name').eq('couple_id', profile.couple_id).neq('id', profile.id).maybeSingle()
  if (partner) document.getElementById('shared-label').textContent = `Objectif commun avec ${partner.name}`

  document.getElementById('templates').innerHTML = TEMPLATES.map(t =>
    `<button type="button" class="tag" data-title="${t.title}" onclick='pickTemplate(${JSON.stringify(t)})'>${t.title}</button>`
  ).join('')

  await loadAll()
}
init()
function handleLogout() {
  db.auth.signOut().then(() => window.location.replace('login.html'))
}
</script>
</body>
</html>
