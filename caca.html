<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>FitCouple — Journal 💩</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="config.js"></script>
</head>
<body>
<div class="app">
  <div class="hdr" style="display:flex;justify-content:space-between;align-items:flex-start">
      <div><h1>Journal 💩</h1><p>Santé intestinale du couple</p></div>
      <button onclick="logout()" style="background:none;border:none;cursor:pointer;font-size:11px;color:var(--muted);padding:4px 0;margin-top:6px">Déconnexion</button>
    </div>
  <div class="page" style="padding-bottom:80px;">
    <div id="date-scroll" class="datescroll"></div>
    <div id="stats-section"></div>
    <button class="btn btn-p" style="margin-bottom:16px" onclick="openAddModal()">+ Enregistrer un passage</button>
    <div id="logs-section"></div>
  </div>
</div>

<nav class="nav" style="position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--card,#fff);border-top:0.5px solid rgba(0,0,0,0.1);padding-bottom:env(safe-area-inset-bottom,0px);display:grid;grid-template-columns:repeat(6,1fr);">
  <a href="index.html"><span class="ni">🏠</span><span class="nl">Dashboard</span></a>
  <a href="repas.html"><span class="ni">🍽️</span><span class="nl">Repas</span></a>
  <a href="sport.html"><span class="ni">⚡</span><span class="nl">Sport</span></a>
  <a href="objectifs.html"><span class="ni">🎯</span><span class="nl">Objectifs</span></a>
  <a href="caca.html" class="active"><span class="ni">💩</span><span class="nl">Journal</span></a>
  <a href="poids.html"><span class="ni">⚖️</span><span class="nl">Poids</span></a>
</nav>

<!-- Modal -->
<div class="overlay" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <div class="mhandle"></div>
    <div class="mtitle" id="modal-title">Enregistrer un passage 💩</div>

    <div class="ig">
      <label>Type (Échelle de Bristol)</label>
      <div id="bristol-picker" style="display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:8px"></div>
      <div id="bristol-info" class="card" style="padding:10px 12px"></div>
    </div>
    <div class="ig" style="margin-top:12px;margin-bottom:20px">
      <label>Notes (optionnel)</label>
      <input class="inp" id="p-notes" placeholder="Après-café, post-sport...">
    </div>
    <button class="btn btn-p" id="p-btn" onclick="saveLog()">Enregistrer 💾</button>
    <button class="btn btn-g" style="margin-top:8px" onclick="document.getElementById('modal').classList.remove('open')">Annuler</button>
  </div>
</div>

<script>
let profile, partner, selectedType = 4, editingId = null
let selDate = new Date().toISOString().split('T')[0]
const today = new Date().toISOString().split('T')[0]

// BRISTOL_EMOJI déjà dans config.js
// BRISTOL_SCORE déjà dans config.js
// BRISTOL_DESC déjà dans config.js
const BRISTOL_LABELS = { 1:'Dure, séparée', 2:'Boudinée, grumelée', 3:'Craquelée', 4:'Banane lisse', 5:'Morceaux doux', 6:'Mou, étalé', 7:'Liquide' }
const SCORE_BADGE    = { 'A+':'b-green', 'A':'b-teal', 'B':'b-amber', 'C':'b-coral', 'D':'b-coral' }

function closeModal(e) {
  if (e.target === document.getElementById('modal')) {
    document.getElementById('modal').classList.remove('open')
    editingId = null
  }
}

function buildDateScroll() {
  const html = [-3,-2,-1,0,1,2].map(off => {
    const d = new Date(Date.now() + off*86400000)
    const iso = d.toISOString().split('T')[0]
    const isT = iso === today, isSel = iso === selDate
    return `<button class="dchip ${isSel?'sel':''} ${isT&&!isSel?'today-chip':''}" onclick="changeDay('${iso}')">
      <div class="dday">${d.toLocaleDateString('fr-FR',{weekday:'short'})}</div>
      <div class="dnum">${d.getDate()}</div>
    </button>`
  }).join('')
  document.getElementById('date-scroll').innerHTML = html
}

async function changeDay(iso) { selDate = iso; buildDateScroll(); await loadLogs() }

function buildBristolPicker() {
  document.getElementById('bristol-picker').innerHTML = [1,2,3,4,5,6,7].map(t => `
    <button type="button" id="bt-${t}" onclick="selectType(${t})" style="
      padding:8px 4px;border-radius:8px;border:none;cursor:pointer;font-size:20px;text-align:center;
      background:${t===selectedType?'var(--green)':'var(--card)'};
      outline:0.5px solid ${t===selectedType?'var(--green)':'var(--border)'};transition:all .15s"
    >${BRISTOL_EMOJI[t]}</button>`).join('')
  updateBristolInfo()
}

function selectType(t) {
  selectedType = t
  document.querySelectorAll('[id^="bt-"]').forEach((b,i) => {
    const n = i+1
    b.style.background = n===t ? 'var(--green)' : 'var(--card)'
    b.style.outline = `0.5px solid ${n===t?'var(--green)':'var(--border)'}`
  })
  updateBristolInfo()
}

function updateBristolInfo() {
  const score = BRISTOL_SCORE[selectedType]
  document.getElementById('bristol-info').innerHTML = `
    <div style="font-size:13px;font-weight:500;margin-bottom:3px">${BRISTOL_EMOJI[selectedType]} Type ${selectedType} — ${BRISTOL_LABELS[selectedType]}</div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:8px">${BRISTOL_DESC[selectedType]}</div>
    <span class="badge ${SCORE_BADGE[score]}">Score : ${score}</span>`
}

function openAddModal() {
  editingId = null
  selectedType = 4
  document.getElementById('modal-title').textContent = 'Enregistrer un passage 💩'
  document.getElementById('p-notes').value = ''
  document.getElementById('p-btn').textContent = 'Enregistrer 💾'
  buildBristolPicker()
  document.getElementById('modal').classList.add('open')
}

function openEditModal(id, bristolType, notes) {
  editingId = id
  selectedType = bristolType
  document.getElementById('modal-title').textContent = 'Modifier le passage'
  document.getElementById('p-notes').value = notes || ''
  document.getElementById('p-btn').textContent = 'Mettre à jour ✏️'
  buildBristolPicker()
  document.getElementById('modal').classList.add('open')
}

async function saveLog() {
  const btn = document.getElementById('p-btn')
  btn.disabled = true; btn.textContent = '...'
  const score = BRISTOL_SCORE[selectedType]
  const notes = document.getElementById('p-notes').value || null

  let error
  if (editingId) {
    ({ error } = await db.from('poop_logs').update({ bristol_type: selectedType, notes, score }).eq('id', editingId))
  } else {
    // Build logged_at with selDate at current time
    const now = new Date()
    const logged_at = selDate === today
      ? now.toISOString()
      : selDate + 'T12:00:00.000Z'
    ;({ error } = await db.from('poop_logs').insert({
      user_id: profile.id, couple_id: profile.couple_id,
      bristol_type: selectedType, notes, score, logged_at
    }))
  }

  if (error) {
    alert('Erreur : ' + error.message)
    btn.disabled = false
    btn.textContent = editingId ? 'Mettre à jour ✏️' : 'Enregistrer 💾'
    return
  }

  document.getElementById('modal').classList.remove('open')
  editingId = null
  btn.disabled = false
  await loadLogs()
}

async function deleteLog(id) {
  if (!confirm('Supprimer ce passage ?')) return
  await db.from('poop_logs').delete().eq('id', id)
  await loadLogs()
}

async function loadLogs() {
  const { data: logs } = await db.from('poop_logs')
    .select('*, profiles(name)')
    .eq('couple_id', profile.couple_id)
    .order('logged_at', { ascending: false })
    .limit(50)

  const all = logs || []
  const dayLogs = all.filter(l => l.logged_at.startsWith(selDate))
  const myLogs  = all.filter(l => l.user_id === profile.id)

  // Stats
  const scores = {}
  all.forEach(l => {
    if (!scores[l.user_id]) scores[l.user_id] = 0
    if (l.score === 'A+' || l.score === 'A') scores[l.user_id]++
  })
  const myS = scores[profile.id] || 0
  const parS = partner ? (scores[partner.id] || 0) : 0
  const champion = myS > parS ? profile.name : parS > myS && partner ? partner.name : '='
  const avgOrder = ['A+','A','B','C','D']
  const avgScore = myLogs.length
    ? avgOrder[Math.min(4, Math.round(myLogs.reduce((s,l) => s + avgOrder.indexOf(l.score), 0) / myLogs.length))]
    : '-'

  document.getElementById('stats-section').innerHTML = `
    <div class="stats" style="grid-template-columns:repeat(3,1fr);margin-bottom:14px">
      <div class="stat"><div class="stat-v" style="color:var(--amber)">${myLogs.length}</div><div class="stat-l">Total</div></div>
      <div class="stat"><div class="stat-v" style="color:var(--green)">${avgScore}</div><div class="stat-l">Score moyen</div></div>
      <div class="stat"><div class="stat-v" style="font-size:12px;color:var(--green)">${champion}</div><div class="stat-l">Champion 🏆</div></div>
    </div>`

  const dateLabel = new Date(selDate+'T12:00:00').toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'})

  if (dayLogs.length === 0) {
    document.getElementById('logs-section').innerHTML = `
      <div class="slabel" style="text-transform:capitalize">${dateLabel}</div>
      <div class="card" style="text-align:center;color:var(--muted);font-size:13px;padding:20px">
        Aucun passage enregistré ce jour
      </div>`
    return
  }

  document.getElementById('logs-section').innerHTML = `
    <div class="slabel" style="text-transform:capitalize">${dateLabel}</div>
    <div class="card">
      ${dayLogs.map((l,i) => {
        const time = new Date(l.logged_at).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})
        const isMe = l.user_id === profile.id
        return `<div class="row-item" ${i===0?'style="padding-top:0"':''}>
          <div class="av ${isMe?'av-a':'av-b'}" style="font-size:10px">${l.profiles?.name?.[0]||'?'}</div>
          <div style="flex:1">
            <div style="font-size:13px">${BRISTOL_EMOJI[l.bristol_type]} Type ${l.bristol_type} · ${time}</div>
            <div style="font-size:11px;color:var(--muted)">${l.notes||BRISTOL_DESC[l.bristol_type]}</div>
          </div>
          <span class="badge ${SCORE_BADGE[l.score]||'b-gray'}">${l.score}</span>
          ${isMe ? `
            <button onclick="openEditModal('${l.id}',${l.bristol_type},${JSON.stringify(l.notes||'')})"
              style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px;padding:0 4px;margin-left:4px">✏️</button>
            <button onclick="deleteLog('${l.id}')"
              style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px;padding:0 4px">🗑️</button>
          ` : ''}
        </div>`
      }).join('')}
    </div>`
}

async function logout() {
  await db.auth.signOut();
  window.location.replace('login.html');
}

async function init() {
  const { user, profile: p } = await requireAuth();
  profile = p
  const { data } = await db.from('profiles').select('*').eq('couple_id', profile.couple_id).neq('id', profile.id).maybeSingle()
  partner = data
  buildDateScroll()
  await loadLogs()
}
init()
</script>
</body>
</html>
