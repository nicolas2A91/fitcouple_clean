<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>FitCouple — Connexion</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="config.js"></script>
  <style>
    .login-wrap{min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:32px 24px;max-width:420px;margin:0 auto}
    .logo{text-align:center;margin-bottom:32px}
    .logo-icon{font-size:56px;margin-bottom:10px}
    .logo h1{font-size:30px;font-weight:800;letter-spacing:-1px}
    .logo p{color:var(--muted);font-size:14px;margin-top:4px}
    .tabs{display:flex;background:var(--card);border-radius:10px;padding:4px;margin-bottom:24px;border:.5px solid var(--border)}
    .tab{flex:1;padding:9px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:500;transition:all .15s;background:transparent;color:var(--muted)}
    .tab.active{background:var(--green);color:#fff}
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="logo">
    <div class="logo-icon">💪</div>
    <h1>FitCouple</h1>
    <p>Anna &amp; Nico</p>
  </div>

  <div class="tabs">
    <button class="tab active" id="tab-login" onclick="switchMode('login')">Connexion</button>
    <button class="tab" id="tab-signup" onclick="switchMode('signup')">Inscription</button>
  </div>

  <div id="alert"></div>

  <!-- Login -->
  <div id="form-login">
    <div class="ig"><label>Email</label><input class="inp" id="l-email" type="email" placeholder="ton@email.com" autocomplete="email"></div>
    <div class="ig" style="margin-bottom:24px"><label>Mot de passe</label><input class="inp" id="l-pass" type="password" placeholder="••••••••" autocomplete="current-password"></div>
    <button class="btn btn-p" id="btn-login" onclick="handleLogin()">Se connecter</button>
  </div>

  <!-- Signup -->
  <div id="form-signup" style="display:none">
    <div class="ig"><label>Ton prénom</label><input class="inp" id="s-name" placeholder="Anna ou Nico" autocomplete="given-name"></div>
    <div class="ig">
      <label>Code couple</label>
      <input class="inp" id="s-couple" placeholder="ex: anna-et-nico-2024">
      <p style="font-size:11px;color:var(--muted);margin-top:5px">🔐 Le même code pour vous deux — c'est votre lien secret</p>
    </div>
    <div class="ig"><label>Email</label><input class="inp" id="s-email" type="email" placeholder="ton@email.com" autocomplete="email"></div>
    <div class="ig" style="margin-bottom:24px"><label>Mot de passe</label><input class="inp" id="s-pass" type="password" placeholder="••••••••" autocomplete="new-password"></div>
    <button class="btn btn-p" id="btn-signup" onclick="handleSignup()">Créer mon compte</button>
  </div>
</div>

<script>
  let busy = false

  // Si déjà connecté → index directement
  // On écoute onAuthStateChange UNE seule fois
  const { data: { subscription: initSub } } = db.auth.onAuthStateChange((event, session) => {
    initSub.unsubscribe()
    if (session) {
      busy = true
      window.location.replace('index.html')
    }
  })

  function switchMode(mode) {
    document.getElementById('tab-login').classList.toggle('active', mode === 'login')
    document.getElementById('tab-signup').classList.toggle('active', mode === 'signup')
    document.getElementById('form-login').style.display = mode === 'login' ? 'block' : 'none'
    document.getElementById('form-signup').style.display = mode === 'signup' ? 'block' : 'none'
    document.getElementById('alert').innerHTML = ''
  }

  function showAlert(msg, type='err') {
    document.getElementById('alert').innerHTML =
      `<div class="alert-${type}" style="margin-bottom:14px">${msg}</div>`
  }

  function setBtn(id, loading, label) {
    const b = document.getElementById(id)
    b.disabled = loading
    b.textContent = loading ? '...' : label
  }

  async function handleLogin() {
    if (busy) return
    const email = document.getElementById('l-email').value.trim()
    const pass  = document.getElementById('l-pass').value
    if (!email || !pass) { showAlert('Remplis tous les champs.'); return }

    setBtn('btn-login', true, 'Se connecter')

    const { data, error } = await db.auth.signInWithPassword({ email, password: pass })

    if (error) {
      const msg = error.message.includes('Invalid') ? '❌ Email ou mot de passe incorrect.'
        : error.message.includes('not confirmed') ? '❌ Email non confirmé — vérifie ta boîte mail.'
        : '❌ ' + error.message
      showAlert(msg)
      setBtn('btn-login', false, 'Se connecter')
      return
    }

    if (!data.session) {
      showAlert('❌ Connexion échouée — réessaie.')
      setBtn('btn-login', false, 'Se connecter')
      return
    }

    busy = true
    showAlert('✅ Connecté !', 'ok')
    window.location.replace('index.html')
  }

  async function handleSignup() {
    if (busy) return
    const name     = document.getElementById('s-name').value.trim()
    const coupleId = document.getElementById('s-couple').value.trim().toLowerCase()
    const email    = document.getElementById('s-email').value.trim()
    const pass     = document.getElementById('s-pass').value

    if (!name || !coupleId || !email || !pass) { showAlert('Remplis tous les champs.'); return }
    if (pass.length < 6) { showAlert('❌ Mot de passe trop court (6 caractères min).'); return }

    setBtn('btn-signup', true, 'Créer mon compte')

    const { data, error } = await db.auth.signUp({ email, password: pass })

    if (error) {
      showAlert('❌ ' + error.message)
      setBtn('btn-signup', false, 'Créer mon compte')
      return
    }

    const userId = data.user?.id
    if (!userId) {
      showAlert('✅ Vérifie ton email pour confirmer, puis connecte-toi.', 'ok')
      switchMode('login')
      setBtn('btn-signup', false, 'Créer mon compte')
      return
    }

    await db.from('profiles').insert({ id: userId, name, couple_id: coupleId, color: 'green' })

    if (data.session) {
      busy = true
      showAlert('✅ Compte créé !', 'ok')
      window.location.replace('index.html')
    } else {
      showAlert('✅ Compte créé ! Vérifie ton email puis connecte-toi.', 'ok')
      switchMode('login')
      setBtn('btn-signup', false, 'Créer mon compte')
    }
  }
</script>
</body>
</html>
