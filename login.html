<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>FitCouple — Connexion</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="config.js"></script>
  <style>
    .login-wrap{min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:32px 24px;max-width:420px;margin:0 auto}
    .logo{text-align:center;margin-bottom:32px}
    .logo-icon{font-size:56px;margin-bottom:10px}
    .logo h1{font-size:30px;font-weight:800;letter-spacing:-1px}
    .logo p{color:var(--muted);font-size:14px;margin-top:4px}
    .tabs{display:flex;background:var(--card);border-radius:10px;padding:4px;margin-bottom:24px;border:.5px solid var(--border)}
    .tab{flex:1;padding:9px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:500;transition:all .15s;background:transparent;color:var(--muted)}
    .tab.active{background:var(--green);color:#fff}
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="logo">
    <div class="logo-icon">💪</div>
    <h1>FitCouple</h1>
    <p>Anna &amp; Nico</p>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchMode('login')">Connexion</button>
    <button class="tab" onclick="switchMode('signup')">Inscription</button>
  </div>

  <div id="alert"></div>

  <!-- Login form -->
  <form id="form-login" onsubmit="handleLogin(event)">
    <div class="ig"><label>Email</label><input class="inp" id="l-email" type="email" placeholder="ton@email.com" required></div>
    <div class="ig" style="margin-bottom:24px"><label>Mot de passe</label><input class="inp" id="l-pass" type="password" placeholder="••••••••" required></div>
    <button class="btn btn-p" type="submit" id="btn-login">Se connecter</button>
  </form>

  <!-- Signup form -->
  <form id="form-signup" style="display:none" onsubmit="handleSignup(event)">
    <div class="ig"><label>Ton prénom</label><input class="inp" id="s-name" placeholder="Anna ou Nico" required></div>
    <div class="ig">
      <label>Code couple</label>
      <input class="inp" id="s-couple" placeholder="ex: anna-et-nico-2024" required>
      <p style="font-size:11px;color:var(--muted);margin-top:5px">🔐 Le même code pour vous deux — c'est votre lien secret</p>
    </div>
    <div class="ig"><label>Email</label><input class="inp" id="s-email" type="email" placeholder="ton@email.com" required></div>
    <div class="ig" style="margin-bottom:24px"><label>Mot de passe</label><input class="inp" id="s-pass" type="password" placeholder="••••••••" required></div>
    <button class="btn btn-p" type="submit" id="btn-signup">Créer mon compte</button>
  </form>
</div>

<script>
  // Redirect if already logged in
  db.auth.getUser().then(({ data: { user } }) => {
    if (user) window.location.href = 'index.html'
  })

  function switchMode(mode) {
    document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (mode==='login' && i===0)||(mode==='signup' && i===1)))
    document.getElementById('form-login').style.display = mode === 'login' ? 'block' : 'none'
    document.getElementById('form-signup').style.display = mode === 'signup' ? 'block' : 'none'
    document.getElementById('alert').innerHTML = ''
  }

  function showAlert(msg, type='err') {
    document.getElementById('alert').innerHTML = `<div class="alert-${type}">${msg}</div>`
  }

  async function handleLogin(e) {
    e.preventDefault()
    const btn = document.getElementById('btn-login')
    btn.textContent = '...'
    const { error } = await db.auth.signInWithPassword({
      email: document.getElementById('l-email').value,
      password: document.getElementById('l-pass').value
    })
    if (error) { showAlert(error.message); btn.textContent = 'Se connecter'; return }
    window.location.href = 'index.html'
  }

  async function handleSignup(e) {
    e.preventDefault()
    const btn = document.getElementById('btn-signup')
    btn.textContent = '...'
    const name = document.getElementById('s-name').value.trim()
    const coupleId = document.getElementById('s-couple').value.trim().toLowerCase()
    const email = document.getElementById('s-email').value
    const pass = document.getElementById('s-pass').value

    const { data, error } = await db.auth.signUp({ email, password: pass })
    if (error) { showAlert(error.message); btn.textContent = 'Créer mon compte'; return }

    const userId = data.user?.id
    if (!userId) {
      showAlert('✅ Compte créé ! Vérifie ton email puis connecte-toi.', 'ok')
      switchMode('login')
      btn.textContent = 'Créer mon compte'
      return
    }

    // Crée le profil tout de suite (fonctionne que la confirmation soit activée ou non)
    const { error: profileError } = await db.from('profiles').insert({
      id: userId, name, couple_id: coupleId, color: 'green'
    })

    // Si confirmation email désactivée → session déjà active → redirection directe
    if (data.session) {
      window.location.href = 'index.html'
      return
    }

    // Sinon → confirmation email requise
    if (profileError) {
      showAlert('Compte créé mais erreur profil : ' + profileError.message)
    } else {
      showAlert('✅ Compte créé ! Vérifie ton email puis connecte-toi.', 'ok')
    }
    switchMode('login')
    btn.textContent = 'Créer mon compte'
  }
</script>
</body>
</html>
